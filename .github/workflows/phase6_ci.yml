name: Phase 6 CI — Song Recommendation

on:
  push:
    paths:
      - "Phase 6 - Hardening and Scaling/**"
  pull_request:
    paths:
      - "Phase 6 - Hardening and Scaling/**"

jobs:
  phase6-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest

      - name: Run Phase 6 tests
        id: phase6_test
        continue-on-error: true
        run: |
          export PYTHONPATH="$(pwd)/Phase 6 - Hardening and Scaling"

          echo "Phase 6 PYTHONPATH:"
          echo "$PYTHONPATH"

          pytest "Phase 6 - Hardening and Scaling/song_recommendations/tests" -q -rA

      - name: Emit CI SUMMARY
        if: always()
        run: |
          if [ "${{ steps.phase6_test.outcome }}" = "success" ]; then
            echo "CI SUMMARY: phase=phase6 status=ok"
          else
            echo "CI SUMMARY: phase=phase6 status=FAIL reason=phase6_tests_failed"
            exit 1
          fi
