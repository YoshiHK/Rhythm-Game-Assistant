name: Phase 6 CI — Song Recommendation

on:
  push:
    paths:
      - "Phase 6 - Hardening and Scaling/**"
      - ".github/workflows/phase6_ci.yml"

jobs:
  phase6-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$(pwd)/Phase 6 - Hardening and Scaling" >> $GITHUB_ENV

      - name: Run Phase 6 tests
        run: |
          pytest "Phase 6 - Hardening and Scaling/song_recommendations/tests" -q -rA
``
