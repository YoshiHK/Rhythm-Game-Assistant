name: Phase 6 CI — Song Recommendation

on:
  push:
    paths:
      - "Phase 6 - Hardening and Scaling/**"
      - ".github/workflows/phase6_ci.yml"
  pull_request:
    paths:
      - "Phase 6 - Hardening and Scaling/**"
      - ".github/workflows/phase6_ci.yml"

jobs:
  phase6-ci:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------
      # Checkout repo
      # -------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------
      # Setup Python
      # -------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------------
      # Minimal dependencies (align Phase 4)
      # -------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # -------------------------------------
      # Phase 6 tests (isolated environment)
      # -------------------------------------
      - name: Run Phase 6 tests
        run: |
          # ✅ CRITICAL: isolate Phase 6 root
          export PYTHONPATH="$(pwd)/Phase 6 - Hardening and Scaling"

          echo "Running Phase 6 CI with PYTHONPATH:"
          echo $PYTHONPATH

          pytest "Phase 6 - Hardening and Scaling/song_recommendations/tests" -q -rA

      # -------------------------------------
      # Summary
      # -------------------------------------
      - name: CI Summary
        if: always()
        run: |
          echo "CI SUMMARY: phase=phase6 status=ok"
