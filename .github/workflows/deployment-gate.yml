name: Deployment Gate

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  deployment-gate:
    runs-on: windows-latest

    steps:
      # --------------------------------------------------
      # 1. Checkout
      # --------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python
      # --------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------
      # 3. Create venv
      # --------------------------------------------------
      - name: Create venv
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip

      # --------------------------------------------------
      # 4. Install requirements (if exists)
      # --------------------------------------------------
      - name: Install requirements
        shell: pwsh
        run: |
          if (Test-Path .\requirements.txt) {
            .\.venv\Scripts\python.exe -m pip install -r .\requirements.txt
          }

      # --------------------------------------------------
      # 5. Prepare CI-local runtime workspace
      # --------------------------------------------------
      - name: Prepare CI data root
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\ci_data | Out-Null
          New-Item -ItemType Directory -Force -Path ".\ci_data\Chart File" | Out-Null

          # Optional: if you have repo-contained chart fixtures, copy them in.
          if (Test-Path ".\tests\fixtures\Chart File") {
            Copy-Item ".\tests\fixtures\Chart File\*" ".\ci_data\Chart File" -Recurse -Force
          }

      # --------------------------------------------------
      # 6. Run setup chain against CI-local DataRoot
      # --------------------------------------------------
      - name: Run setup chain
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass

          .\setup.ps1 `
            -RepoRoot "." `
            -DataRoot ".\ci_data" `
            -OfflineValidationMode `
            -RunStageProbes `
            -RunOrchestrator `
            -EnableCaseExpectOverride `
            -RequireInterpretationOutput `
            -SkipNonFeedbackCases `
            -StrictValidation

      # --------------------------------------------------
      # 7. Resolve latest offline validation report from CI-local DataRoot
      # --------------------------------------------------
      - name: Resolve offline validation report
        id: offline
        shell: pwsh
        run: |
          $report = Get-ChildItem `
            ".\ci_data\offline_validation" `
            -Recurse -Filter "offline_validation_report.json" |
            Sort-Object LastWriteTime |
            Select-Object -Last 1

          if (-not $report) {
            throw "offline_validation_report.json not found under .\ci_data\offline_validation"
          }

          "report_path=$($report.FullName)" >> $env:GITHUB_OUTPUT

      # --------------------------------------------------
      # 8. Resolve runtime index from CI-local outputs only (optional)
      # --------------------------------------------------
      - name: Resolve runtime index
        id: runtime
        shell: pwsh
        run: |
          # Prefer CI-local generated runtime index, if your pipeline emits one.
          $idx = Get-ChildItem `
            ".\ci_data" `
            -Recurse -Filter "runtime_index.json" |
            Sort-Object LastWriteTime |
            Select-Object -Last 1

          if ($idx) {
            "runtime_index_path=$($idx.FullName)" >> $env:GITHUB_OUTPUT
          }

      # --------------------------------------------------
      # 9. Run deployment gate (online-only artifacts)
      # --------------------------------------------------
      - name: Run deployment gate
        shell: pwsh
        run: |
          $args = @(
            ".\deployment_gate.py",
            "--offline-validation-report", "${{ steps.offline.outputs.report_path }}",
            "--output", ".\deployment_gate_report.json"
          )

          # Only require runtime_index if this run actually generated one inside CI-local workspace.
          if ("${{ steps.runtime.outputs.runtime_index_path }}" -ne "") {
            $args += "--runtime-index"
            $args += "${{ steps.runtime.outputs.runtime_index_path }}"
            $args += "--require-runtime-index"
          }

          .\.venv\Scripts\python.exe @args

      # --------------------------------------------------
      # ✅ 10. Upload deployment report artifact
      # --------------------------------------------------
      - name: Upload deployment gate report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-gate-report
          path: deployment_gate_report.json
