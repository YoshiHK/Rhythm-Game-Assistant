name: Phase 4.5 Localization CI

on:
  push:
    paths:
      - "Phase 4.5 - Localization/**"
  pull_request:
    paths:
      - "Phase 4.5 - Localization/**"

jobs:
  localization-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest

      - name: Run Phase 4.5 CI checks
        id: localization_test
        continue-on-error: true
        run: |
          python "Phase 4.5 - Localization/ci/run_all_localization_checks.py"

      - name: Emit CI SUMMARY
        if: always()
        run: |
          if [ "${{ steps.localization_test.outcome }}" = "success" ]; then
            echo "CI SUMMARY: phase=phase45 status=ok"
          else
            echo "CI SUMMARY: phase=phase45 status=FAIL reason=localization_checks_failed"
            exit 1
          fi
