name: Integration CI — Pipeline Smoke

on:
  push:
    paths:
      - "api/**"
      - "tests/integration/**"
      - ".github/workflows/integration_ci.yml"

jobs:
  integration-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$(pwd)/Phase 6 - Hardening and Scaling:$(pwd)/Phase 7 - Games Recommendation:$(pwd)/Phase 4 - Personalization" >> $GITHUB_ENV

      - name: Run integration tests
        run: |
          pytest "tests/integration/" -q -rA
