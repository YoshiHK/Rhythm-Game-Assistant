name: Integration CI — Pipeline Validation

on:
  push:
    paths:
      - "api/**"
      - "tests/integration/**"
      - ".github/workflows/integration_ci.yml"
  pull_request:
    paths:
      - "api/**"
      - "tests/integration/**"
      - ".github/workflows/integration_ci.yml"

jobs:
  integration-ci:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------
      # Checkout repo
      # -------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------
      # Setup Python
      # -------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------------
      # Install dependencies
      # -------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # -------------------------------------
      # Full pipeline environment (ONLY here)
      # -------------------------------------
      - name: Run integration tests (full pipeline)
        run: |
          # ✅ Only Integration CI combines phases
          export PYTHONPATH="$(pwd)/Phase 6 - Hardening and Scaling:$(pwd)/Phase 7 - Games Recommendation:$(pwd)/Phase 4 - Personalization"

          echo "Integration CI PYTHONPATH:"
          echo $PYTHONPATH

          pytest "tests/integration/" -q -rA

      # -------------------------------------
      # Summary
      # -------------------------------------
      - name: CI Summary
        if: always()
        run: |
          echo "✅ Integration pipeline validation completed"
