name: Integration CI — Pipeline Validation

on:
  push:
    paths:
      - "api/**"
      - "tests/integration/**"
      - ".github/workflows/integration_ci.yml"
  pull_request:
    paths:
      - "api/**"
      - "tests/integration/**"
      - ".github/workflows/integration_ci.yml"

jobs:
  integration-ci:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------
      # Checkout repo
      # -------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------
      # Setup Python
      # -------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------------
      # Install dependencies
      # -------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # -------------------------------------
      # Run integration tests (controlled pipeline)
      # -------------------------------------
      - name: Run integration tests
        id: integration_test
        continue-on-error: true
        run: |
          export PYTHONPATH="$(pwd)/Phase 6 - Hardening and Scaling:$(pwd)/Phase 7 - Games Recommendation:$(pwd)/Phase 4 - Personalization"

          echo "Integration CI PYTHONPATH:"
          echo "$PYTHONPATH"

          pytest "tests/integration/" -q -rA

      # -------------------------------------
      # Emit structured CI SUMMARY (CRITICAL)
      # -------------------------------------
      - name: Emit CI SUMMARY
        if: always()
        run: |
          if [ "${{ steps.integration_test.outcome }}" = "success" ]; then
            echo "CI SUMMARY: phase=integration status=ok"
          else
            echo "CI SUMMARY: phase=integration status=FAIL reason=integration_tests_failed"
            exit 1
          fi
