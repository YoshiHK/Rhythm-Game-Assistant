name: Phase 4 Personalization CI

on:
  push:
    paths:
      - "Phase 4 - Personalization/**"
      - "Phase 3 - UMI/**"
  pull_request:
    paths:
      - "Phase 4 - Personalization/**"
      - "Phase 3 - UMI/**"

jobs:
  phase4-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ install minimal deps (Phase 4 must stay clean)
      - name: Install dependencies
        run: |
          pip install pytest

      # ✅ 🔒 Phase 4 CI runner (authoritative)
      - name: Run Phase 4 CI checks
        run: |
          python "Phase 4 - Personalization/ci/phase_4_ci_runner.py"

      # ✅ deterministic regression / fixtures
      - name: Run Phase 4 tests
        run: |
          pytest "Phase 4 - Personalization/ci/tests/"
