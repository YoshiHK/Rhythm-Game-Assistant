name: Phase 4 Personalization CI

on:
  push:
    paths:
      - "Phase 4 - Personalization/**"
  pull_request:
    paths:
      - "Phase 4 - Personalization/**"

jobs:
  phase4-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest

      - name: Run Phase 4 CI runner
        id: phase4_test
        continue-on-error: true
        run: |
          python "Phase 4 - Personalization/ci/phase_4_ci_runner.py"

      - name: Emit CI SUMMARY
        if: always()
        run: |
          if [ "${{ steps.phase4_test.outcome }}" = "success" ]; then
            echo "CI SUMMARY: phase=phase4 status=ok"
          else
            echo "CI SUMMARY: phase=phase4 status=FAIL reason=phase4_ci_runner_failed"
            exit 1
          fi
``
