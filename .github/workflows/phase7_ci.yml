name: Phase 7 CI — Game Recommendation Governance

on:
  push:
    paths:
      - "Phase 7 - Games Recommendation/**"
      - ".github/workflows/phase7_ci.yml"
  pull_request:
    paths:
      - "Phase 7 - Games Recommendation/**"
      - ".github/workflows/phase7_ci.yml"

jobs:
  phase7-ci:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Setup Python (same as Phase 4)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ Minimal dependencies
      - name: Install dependencies
        run: |
          pip install pytest

      # 🔒 Phase 7 isolated environment (CRITICAL)
      - name: Set PYTHONPATH (Phase 7 only)
        run: |
          PHASE7_PATH="$(pwd)/Phase 7 - Games Recommendation"
          echo "PYTHONPATH=$PHASE7_PATH" >> $GITHUB_ENV

      # ✅ Phase 7 CI (single responsibility)
      - name: Run Phase 7 CI tests
        run: |
          pytest "Phase 7 - Games Recommendation/ci/" -q -rA

