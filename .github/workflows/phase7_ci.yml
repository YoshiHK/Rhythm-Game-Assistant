name: Phase 7 CI — Game Recommendation Governance

on:
  push:
    paths:
      - "Phase 7 - Games Recommendation/**"
      - ".github/workflows/phase7_ci.yml"
  pull_request:
    paths:
      - "Phase 7 - Games Recommendation/**"

jobs:
  phase7-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # Set PYTHONPATH to Phase 7 root
      - name: Set PYTHONPATH
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)/Phase 7 - Games Recommendation"

      - name: Run Phase 7 CI tests (fail-fast)
        run: echo "PYTHONPATH=$(pwd)/Phase 7 - Games Recommendation" >> $GITHUB_ENV

      - name: Pytest summary
        if: always()
        run: |
          pytest "Phase 7 - Games Recommendation/ci/" -q -rA || true
