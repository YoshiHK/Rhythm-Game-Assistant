name: Phase 7 CI — Game Recommendation Governance

on:
  push:
    paths:
      - "Phase 7 - Games Recommendation/**"
  pull_request:
    paths:
      - "Phase 7 - Games Recommendation/**"

jobs:
  phase7-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest

      - name: Run Phase 7 tests
        id: phase7_test
        continue-on-error: true
        run: |
          export PYTHONPATH="$(pwd)/Phase 7 - Games Recommendation"

          echo "Phase 7 PYTHONPATH:"
          echo "$PYTHONPATH"

          pytest "Phase 7 - Games Recommendation/ci/" -q -rA

      - name: Emit CI SUMMARY
        if: always()
        run: |
          if [ "${{ steps.phase7_test.outcome }}" = "success" ]; then
            echo "CI SUMMARY: phase=phase7 status=ok"
          else
            echo "CI SUMMARY: phase=phase7 status=FAIL reason=phase7_tests_failed"
            exit 1
          fi
