name: Phase 7 CI — Game Recommendation Governance

on:
  push:
    paths:
      - "Phase 7 - Games Recommendation/**"
      - ".github/workflows/phase7_ci.yml"

jobs:
  phase7-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$(pwd)/Phase 7 - Games Recommendation" >> $GITHUB_ENV

      - name: Run Phase 7 CI tests
        working-directory: Phase 7 - Games Recommendation
        run: |
          pytest ci/ -q -rA

      - name: CI Summary
        if: always()
        run: |
          echo "✅ Phase 7 CI completed"
