name: Phase 7 CI — Game Recommendation Governance

on:
  push:
    paths:
      - "Phase 7 - Games Recommendation/**"
      - ".github/workflows/phase7_ci.yml"
  pull_request:
    paths:
      - "Phase 7 - Games Recommendation/**"
      - ".github/workflows/phase7_ci.yml"

jobs:
  phase7-ci:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------
      # Checkout repo
      # -------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------
      # Setup Python
      # -------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------------
      # Minimal dependencies
      # -------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # -------------------------------------
      # Phase 7 CI (isolated environment)
      # -------------------------------------
      - name: Run Phase 7 CI tests
        run: |
          # ✅ CRITICAL: set PYTHONPATH to Phase 7 root ONLY
          export PYTHONPATH="$(pwd)/Phase 7 - Games Recommendation"

          echo "Running Phase 7 CI with PYTHONPATH:"
          echo $PYTHONPATH

          pytest "Phase 7 - Games Recommendation/ci/" -q -rA

      # -------------------------------------
      # Summary
      # -------------------------------------
      - name: CI Summary
        if: always()
        run: |
          echo "✅ Phase 7 CI completed"
