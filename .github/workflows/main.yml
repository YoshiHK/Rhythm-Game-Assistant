name: CI

on:
  push:
  pull_request:

jobs:
  localization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if needed)
        run: |
          python -m pip install --upgrade pip
          # If you have a requirements file, uncomment one of these:
          # pip install -r api/requirements.txt
          # pip install -r requirements.txt

      - name: Run Phase 4.5 localization checks
        run: |
          mkdir -p CI/Phase_4_5/logs CI/Phase_4_5/artifacts
          python CI/Phase_4_5/run_all_localization_checks.py | tee CI/Phase_4_5/logs/localization.log

      - name: Scrape CI SUMMARY artifacts
        run: |
          python scripts/observability/scrape_ci_summaries.py \
            --log CI/Phase_4_5/logs/localization.log \
            --out CI/Phase_4_5/artifacts

      - name: CI SUMMARY alert gate
        run: |
          python scripts/observability/alert_ci_summary.py \
            --aggregate CI/Phase_4_5/artifacts/ci_summary_aggregate.json

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-artifacts
          path: CI/Phase_4_5/artifacts/
