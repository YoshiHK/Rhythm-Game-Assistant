[pytest]

# Register custom markers to avoid warnings
markers =
    phase4_policy: Phase 4 policy enforcement tests
    phase4_determinism: Phase 4 determinism regression tests
    integration: marks tests as integration tests

# Make marker usage strict (prevents typos)
addopts = --strict-markers

# Improve test output readability
testpaths =
    Phase 6 - Hardening and Scaling/song_recommendations/tests
    tests

# Optional: nicer output for CI
console_output_style = progress

# Optional: filter common harmless warnings
filterwarnings =
    ignore::UserWarning
